<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="840" height="340" rx="18" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="430" y="52" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Claude builds the deck from your conversation</text>

  <!-- chat: user bubble -->
  <rect x="55" y="92" width="430" height="46" rx="14" fill="#2563eb"/>
  <text x="78" y="120" font-size="15" fill="#ffffff">Make me a deck of 10 Spanish travel phrases</text>

  <!-- chat: claude bubble -->
  <rect x="55" y="152" width="360" height="46" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="78" y="180" font-size="14" fill="#0f172a">Saved "Spanish Travel Phrases" (10 cards)</text>

  <text x="120" y="238" font-size="13" fill="#64748b">calls create_deck &#8594; persists to data/decks.json</text>

  <!-- arrow to deck -->
  <line x1="520" y1="150" x2="575" y2="150" stroke="#94a3b8" stroke-width="3"/>
  <polygon points="575,150 565,145 565,155" fill="#94a3b8"/>

  <!-- deck stack -->
  <rect x="612" y="118" width="190" height="120" rx="12" fill="#e2e8f0"/>
  <rect x="606" y="110" width="190" height="120" rx="12" fill="#cbd5e1"/>
  <rect x="600" y="102" width="190" height="120" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="618" y="128" font-size="11" font-weight="700" letter-spacing="1.5" fill="#2563eb">FRONT</text>
  <text x="695" y="168" text-anchor="middle" font-size="15" fill="#0f172a">Where is the bathroom?</text>
  <text x="695" y="262" text-anchor="middle" font-size="13" fill="#64748b">Spanish Travel Phrases &#183; 10 cards</text>
</svg>
